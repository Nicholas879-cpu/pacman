name: Docker Build & Container Scan (Trivy)

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Semgrep"]
    types:
      - completed

jobs:
  build-and-scan:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    # 🔹 Shared image metadata (used by Trivy + DAST)
    env:
      IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/pacman-nodejs
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      # 🔹 Build image using SHA tag
      - name: Build Node.js app image
        run: |
          docker build \
            -t "${IMAGE_REPO}:${IMAGE_TAG}" \
            -f docker/Dockerfile .

      # 🔹 Trivy scan – app image (same SHA tag)
      - name: Run Trivy scan (app image)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: '${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'   # set to 1 later when you want to enforce
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 🔹 MongoDB image scan (base dependency)
      - name: Pull MongoDB 3.4 image
        run: docker pull mongo:3.4

      - name: Run Trivy scan (mongo image)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'mongo:3.4'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 🔹 Login so image is available for DAST workflow
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔹 Push SHA-tagged image (DAST will pull this)
      - name: Push app image (SHA tag)
        run: |
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
